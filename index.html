<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrega de Turno — Data Centers</title>
  <meta name="description" content="Sistema de entrega de turno para Data Centers: San Martín, Apoquindo y Paine">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.2/html2pdf.bundle.min.js"></script>
  <style>
:root {
  /* Colors */
  --bg-color: #0b1120;
  --surface1: #111827;
  --surface2: #1f2937;
  --surface3: #374151;
  --border: rgba(255, 255, 255, 0.08);
  
  --text1: #f3f4f6;
  --text2: #9ca3af;
  --text3: #6b7280;

  --primary: #06b6d4;
  --primary-hover: #0891b2;
  --primary-bg: rgba(6, 182, 212, 0.1);

  --green: #34d399;
  --green-bg: rgba(52, 211, 153, 0.1);
  --cyan: #22d3ee;
  --cyan-bg: rgba(34, 211, 238, 0.1);
  --indigo: #818cf8;
  --indigo-bg: rgba(129, 140, 248, 0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251, 191, 36, 0.1);
  --rose: #fb7185;
  --rose-bg: rgba(251, 113, 133, 0.1);
  --teal: #2dd4bf;
  --teal-bg: rgba(45, 212, 191, 0.1);
  --sky: #38bdf8;
  --sky-bg: rgba(56, 189, 248, 0.1);

  /* Dimensions & Fonts */
  --max-w: 1200px;
  --modal-w: 750px;
  --radius: 12px;
  --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
  --font-mono: 'Space Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-sans);
  background-color: var(--bg-color);
  color: var(--text1);
  min-height: 100vh;
  line-height: 1.5;
  padding-bottom: 60px;
}

::selection {
  background: var(--primary-bg);
  color: var(--primary);
}

/* ── HEADER ── */
.header {
  background: var(--surface1);
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  background: rgba(17, 24, 39, 0.85);
}
.header-logo {
  display: flex;
  align-items: center;
  gap: 16px;
}
.logo-icon {
  background: linear-gradient(135deg, var(--primary), var(--indigo));
  width: 42px;
  height: 42px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
}
.logo-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text1);
  letter-spacing: -0.5px;
}
.logo-sub {
  font-size: 12px;
  color: var(--text2);
}
.header-right {
  display: flex;
  align-items: center;
  gap: 20px;
  font-family: var(--font-mono);
  font-size: 13px;
  color: var(--text2);
}
.header-status {
  background: var(--green-bg);
  color: var(--green);
  padding: 6px 12px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1px solid rgba(52,211,153,.2);
}
.pulse-dot {
  width: 8px;
  height: 8px;
  background: var(--green);
  border-radius: 50%;
  box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7); }
  70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(52, 211, 153, 0); }
  100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52, 211, 153, 0); }
}

/* ── LAYOUT ── */
.container {
  max-width: var(--max-w);
  margin: 0 auto;
  padding: 32px 20px;
}

/* ── STATS ROW ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 16px;
  margin-bottom: 32px;
}
.stat-card {
  background: var(--surface1);
  border: 1px solid var(--border);
  padding: 20px;
  border-radius: var(--radius);
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: transform .2s;
}
.stat-card:hover { border-color: var(--primary); transform: translateY(-2px); }
.stat-val {
  font-family: var(--font-mono);
  font-size: 28px;
  font-weight: 700;
  color: var(--text1);
  margin-bottom: 4px;
}
.stat-lbl {
  font-size: 11px;
  color: var(--text2);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* ── SEND PANEL (CONSOLIDATION) ── */
.send-panel {
  background: var(--surface1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 32px;
  box-shadow: 0 8px 30px rgba(0,0,0,.2);
}
.send-panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
}
.send-panel-title {
  font-size: 18px;
  font-weight: 700;
  color: var(--text1);
  display: flex;
  align-items: center;
  gap: 8px;
}
.send-panel-sub {
  font-size: 13px;
  color: var(--text2);
  margin-top: 4px;
}
.dc-status-row {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.dc-status-card {
  background: var(--bg-color);
  border: 1px solid var(--border);
  padding: 16px;
  border-radius: 10px;
  transition: all .3s;
}
.dc-status-card.complete {
  border-color: rgba(52,211,153,.3);
  background: linear-gradient(to bottom right, var(--bg-color), rgba(52,211,153,.05));
}
.dc-status-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.dc-status-title { font-weight: 600; font-size: 14px; }
.dc-status-icon {
  width: 24px; height: 24px;
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px;
}
.dc-status-icon.pending { background: var(--surface3); }
.dc-status-icon.done { background: var(--green); color: #000; box-shadow: 0 0 10px rgba(52,211,153,.4); }
.dc-status-detail { font-size: 12px; color: var(--text3); }
.dc-status-card.complete .dc-status-detail { color: var(--green); }

/* ── TABS ── */
.tabs {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1px;
}
.tab {
  background: transparent;
  color: var(--text2);
  border: none;
  font-family: var(--font-sans);
  font-size: 15px;
  font-weight: 600;
  padding: 14px 24px;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all .2s;
  display: flex;
  align-items: center;
  gap: 10px;
}
.tab:hover { color: var(--text1); }
.tab.active {
  color: var(--primary);
  border-bottom-color: var(--primary);
}
.tab-count {
  background: var(--surface3);
  color: var(--text1);
  padding: 2px 8px;
  border-radius: 10px;
  font-size: 11px;
  transition: all .2s;
}
.tab.active .tab-count {
  background: var(--primary-bg);
  color: var(--primary);
}

#tab-SanMartin.active { color: var(--cyan); border-bottom-color: var(--cyan); }
#tab-SanMartin.active .tab-count { background: var(--cyan-bg); color: var(--cyan); }
#tab-Apoquindo.active { color: var(--indigo); border-bottom-color: var(--indigo); }
#tab-Apoquindo.active .tab-count { background: var(--indigo-bg); color: var(--indigo); }
#tab-Paine.active { color: var(--green); border-bottom-color: var(--green); }
#tab-Paine.active .tab-count { background: var(--green-bg); color: var(--green); }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; animation: fadeUp .4s ease; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  background: var(--surface1);
  padding: 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}
.toolbar-left, .toolbar-right { display: flex; gap: 12px; align-items: center; }

/* ── FORMS & INPUTS ── */
.filter-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text1);
  padding: 10px 14px;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 14px;
  transition: all .2s;
}
.filter-input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px var(--primary-bg);
}
select.filter-input { cursor: pointer; }

/* ── BUTTONS ── */
.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 8px;
  font-family: var(--font-sans);
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.btn:active { transform: scale(0.97); }

.btn-primary {
  background: var(--primary);
  color: #0b1120;
}
.btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px var(--primary-bg); }

.btn-secondary {
  background: var(--surface3);
  color: var(--text1);
}
.btn-secondary:hover { background: var(--border); }

.btn-print {
  background: transparent;
  color: var(--text2);
  border: 1px solid var(--surface3);
}
.btn-print:hover { color: var(--text1); border-color: var(--text1); }

/* ── BADGES ── */
.dc-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.dc-badge.sm { background: var(--cyan-bg); color: var(--cyan); border: 1px solid rgba(34,211,238,.2); }
.dc-badge.aq { background: var(--indigo-bg); color: var(--indigo); border: 1px solid rgba(129,140,248,.2); }
.dc-badge.pn { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,.2); }

.shift-badge {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 4px;
  font-weight: 700;
}
.shift-badge.manana { background: var(--amber-bg); color: var(--amber); }
.shift-badge.tarde { background: var(--primary-bg); color: var(--primary); }
.shift-badge.noche { background: var(--indigo-bg); color: var(--indigo); }
.shift-badge.ptday { background: var(--teal-bg); color: var(--teal); }
.shift-badge.ptnight { background: var(--rose-bg); color: var(--rose); }

/* ── LAST HANDOVER HIGHLIGHT ── */
.last-handover {
  background: linear-gradient(180deg, rgba(6,182,212,0.05) 0%, rgba(6,182,212,0) 100%);
  border: 1px solid rgba(6,182,212,0.2);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 32px;
  position: relative;
  overflow: hidden;
}
.last-handover::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--primary);
}
.last-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
}
.last-grid {
  display: grid; grid-template-columns: auto 1fr; gap: x 20px; column-gap: 32px; row-gap: 12px;
}
.last-label { color: var(--text3); font-size: 13px; display: flex; align-items: center; gap: 6px; }
.last-val { color: var(--text1); font-size: 14px; }
.last-preview {
  margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 20px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
.last-prev-box { padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
.last-prev-box.done { background: var(--green-bg); border-left: 3px solid var(--green); color: var(--text2); }
.last-prev-box.pending { background: var(--amber-bg); border-left: 3px solid var(--amber); color: var(--text2); }
.last-prev-label { font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--text1); }

/* ── HANDOVER LIST ── */
.date-sep {
  font-size: 11px;
  font-weight: 800;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin: 32px 0 16px 0;
  display: flex;
  align-items: center;
  gap: 12px;
}
.date-sep::after { content:''; flex:1; height:1px; background: var(--border); }

.ho-card {
  background: var(--surface1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  transition: all .2s;
  overflow: hidden;
}
.ho-card:hover { border-color: rgba(255,255,255,0.2); }
.ho-card.dc-sm:hover { border-color: rgba(34,211,238,.4); }
.ho-card.dc-aq:hover { border-color: rgba(129,140,248,.4); }
.ho-card.dc-pn:hover { border-color: rgba(52,211,153,.4); }

.ho-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 20px;
  cursor: pointer;
}
.ho-meta { flex: 1; }
.ho-date { font-size: 13px; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.ho-people { font-size: 15px; color: var(--text1); display: flex; align-items: center; gap: 12px; }
.ho-arrow { color: var(--text3); }

.ho-actions { display: flex; align-items: center; gap: 12px; }
.ho-btn-sm {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text2);
  width: 32px; height: 32px;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
}
.ho-btn-sm:hover { background: var(--surface3); color: var(--text1); }
.ho-btn-del:hover { background: var(--rose-bg) !important; color: var(--rose) !important; border-color: rgba(251,113,133,.3) !important; }
.ho-toggle {
  font-size: 11px;
  color: var(--text3);
  transition: transform .3s;
}
.ho-card.open .ho-toggle { transform: rotate(180deg); }

.ho-body {
  padding: 0 20px;
  max-height: 0;
  overflow: hidden;
  opacity: 0;
  transition: all .3s ease;
  background: var(--bg-color);
}
.ho-card.open .ho-body {
  padding: 20px;
  max-height: 2000px;
  opacity: 1;
  border-top: 1px solid var(--border);
}

.ho-section { margin-bottom: 20px; }
.ho-section:last-child { margin-bottom: 0; }
.ho-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  margin-bottom: 8px;
}
.ho-section-title.done { color: var(--green); }
.ho-section-title.pending { color: var(--amber); }
.ho-section-title.running { color: var(--sky); }
.ho-section-title.obs { color: var(--text3); }

.ho-section-content {
  background: var(--surface1);
  padding: 14px 18px;
  border-radius: 8px;
  font-size: 14px;
  line-height: 1.6;
  white-space: pre-wrap;
  color: var(--text1);
  border: 1px solid var(--border);
}
.ho-section-content.done { border-left: 3px solid var(--green); }
.ho-section-content.running { border-left: 3px solid var(--sky); }
.ho-section-content.pending { border-left: 3px solid var(--amber); }
.ho-section-content.obs { border-left: 3px solid var(--text3); }

.empty-state {
  text-align: center;
  padding: 60px 20px;
  background: var(--surface1);
  border-radius: var(--radius);
  border: 1px dashed var(--surface3);
}
.empty-icon { font-size: 40px; margin-bottom: 16px; display: block; opacity: .5; }
.empty-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text2); }
.empty-sub { font-size: 14px; color: var(--text3); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex; justify-content: center; align-items: flex-start;
  padding: 40px 20px;
  opacity: 0; visibility: hidden;
  transition: all .3s;
  overflow-y: auto;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  background: var(--bg-color);
  width: var(--modal-w);
  border-radius: 16px;
  border: 1px solid var(--border);
  padding: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,.4);
  transform: translateY(-20px);
  transition: all .3s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal h2 { font-size: 22px; margin-bottom: 4px; }
.modal-sub { font-size: 14px; color: var(--text3); margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }

.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }

.form-section {
  margin-bottom: 24px;
  padding: 20px;
  border-radius: 8px;
}
.form-section label {
  display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px;
  letter-spacing: .6px;
}
.form-section.done { background: var(--green-bg); color: var(--green); border-top: 1px solid rgba(52,211,153,.15); border-bottom: 1px solid rgba(52,211,153,.15); }
.form-section.running { background: var(--sky-bg); color: var(--sky); border-top: 1px solid rgba(56,189,248,.15); border-bottom: 1px solid rgba(56,189,248,.15); }
.form-section.pending { background: var(--amber-bg); color: var(--amber); border-top: 1px solid rgba(245,158,11,.15); border-bottom: 1px solid rgba(245,158,11,.15); }
.form-section.obs { background: var(--surface3); color: var(--text3); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }

textarea {
  width: 100%;
  background: var(--surface1);
  border: 1px solid var(--border);
  color: var(--text1);
  border-radius: 6px;
  padding: 12px;
  font-family: var(--font-sans);
  font-size: 14px;
  resize: vertical;
  min-height: 80px;
}
textarea:focus { outline: none; border-color: currentColor; }

.modal-actions {
  display: flex; justify-content: flex-end; gap: 12px;
  margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);
}

/* ── BUTTONS EXTRA ── */
.btn-download {
  padding: 12px 24px;
  border: none;
  border-radius: 10px;
  font-size: 14px;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  transition: all .3s;
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: linear-gradient(135deg, var(--green), var(--teal));
  color: #0a0f1c;
  box-shadow: 0 4px 16px rgba(52,211,153,.3);
  white-space: nowrap;
}
.btn-download:hover:not(:disabled) {
  transform: translateY(-2px);
  box-shadow: 0 6px 24px rgba(52,211,153,.4);
  filter: brightness(1.1);
}
.btn-download:disabled {
  opacity: .4;
  cursor: not-allowed;
  filter: grayscale(.5);
  box-shadow: none;
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
  background: var(--surface1); color: var(--text1);
  padding: 12px 24px; border-radius: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,.5);
  border: 1px solid var(--border);
  font-size: 14px; font-weight: 600;
  z-index: 10000;
  opacity: 0; transition: all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .form-grid { grid-template-columns: 1fr; gap: 0; }
  .tabs { flex-direction: column; }
  .tab { width: 100%; justify-content: space-between; }
  .toolbar { flex-direction: column; gap: 16px; align-items: stretch; }
  .toolbar-left, .toolbar-right { width: 100%; flex-wrap: wrap; }
  .toolbar-left input { flex: 1; }
  .last-grid { grid-template-columns: 1fr; gap: 8px; }
  .last-preview { grid-template-columns: 1fr; }
  .modal { width: 100%; padding: 20px; }
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .dc-status-row { grid-template-columns: 1fr; }
}

/* ── PRINT ── */
@media print {
  body { background: #fff; color: #000; padding: 0; }
  .header, .stats-row, .tabs, .toolbar, .ho-actions, .send-panel, #toast { display: none !important; }
  .container { padding: 0; }
  .ho-card { border: 1px solid #ccc; break-inside: avoid; margin-bottom: 20px; }

}

</style>
</head>

<!-- APP SCRIPTS -->
<script>
// ══════════════════════════════════════════════════════
// ══  ENTREGA DE TURNO — App Standalone             ══
// ══════════════════════════════════════════════════════

const DC_LIST = ['SanMartin','Apoquindo','Paine'];
const DC_LABELS = { SanMartin: 'DC San Martín', Apoquindo: 'DC Apoquindo', Paine: 'DC Paine' };
const DC_BADGE_CLASS = { SanMartin: 'sm', Apoquindo: 'aq', Paine: 'pn' };
const DC_CARD_CLASS = { SanMartin: 'dc-sm', Apoquindo: 'dc-aq', Paine: 'dc-pn' };

// Trabajadores por defecto (se pueden ajustar)
const WORKERS = {
  SanMartin: [
    { name: 'Ruebn Machaca', role: 'Operador 1' },
    { name: 'Francisco Feliu', role: 'Operador 2' },
    { name: 'Ricardo Orellana', role: 'Operador 3' },
    { name: 'Aldo Valenzuela', role: 'Supervisor' },
    { name: 'Fernanda Frez', role: 'Commodities 1' },
    { name: 'Javier Bravo', role: 'Supervisor' },
    { name: 'Jonathan Marquez', role: 'Commodities 3' },
    { name: 'Martín Henriquez', role: 'Operador PT' },
    { name: 'Esteban Avello', role: 'Operador PT' }
  ],
  Apoquindo: [
    { name: 'Mario Barrientos', role: 'Operador 1' },
    { name: 'Jaime Alarcon', role: 'Operador 2' },
    { name: 'Cristopher Maldonado', role: 'Operador 3' },
    { name: 'Carlos Araya', role: 'Commodities' },
    { name: 'Daniel Bustos', role: 'Supervisor' },
    { name: 'Marco Inzulza', role: 'Supervisor' }
  ],
  Paine: [
    { name: 'Felipe Jimenez', role: 'Operador 1' },
    { name: 'Gabriel Torres', role: 'Operador 2' },
    { name: 'Claudio Peña', role: 'Operador 3' },
    { name: 'José Contreras', role: 'Supervisor' }
  ]
};

let allHandovers = [];
let handovers = [];
let currentDC = 'SanMartin';

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  loadHandovers();
  updateClock();
  setInterval(updateClock, 30000);
});

function updateClock() {
  const el = document.getElementById('header-time');
  if (el) el.textContent = new Date().toLocaleString('es-CL', {
    weekday: 'short', day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit'
  });
}

// ── API (localStorage only) ──
async function loadHandovers() {
  const raw = localStorage.getItem('entrega_turno_data');
  allHandovers = raw ? JSON.parse(raw) : [];
  handovers = allHandovers.filter(h => h.status !== 'archived');
  render();
}

function saveLocal() {
  localStorage.setItem('entrega_turno_data', JSON.stringify(allHandovers));
}

async function apiSave(h) { saveLocal(); }
async function apiUpdate(h) { saveLocal(); }
async function apiDelete(id) { saveLocal(); }
async function apiDeleteAll() { saveLocal(); });
  } catch (e) { console.warn('API delete all error', e); }
  saveLocal();
}

// ── DC Navigation ──
function setDC(dc) {
  currentDC = dc;
  DC_LIST.forEach(d => {
    const tab = document.getElementById('tab-' + d);
    const panel = document.getElementById('panel-' + d);
    if (tab) tab.classList.toggle('active', d === dc);
    if (panel) panel.classList.toggle('active', d === dc);
  });
  render();
}

// ── Render ──
function render() {
  renderStats();
  DC_LIST.forEach(dc => {
    renderLastHandover(dc);
    renderList(dc);
  });
  // Update tab counts
  DC_LIST.forEach(dc => {
    const countEl = document.getElementById('tab-count-' + dc);
    const n = handovers.filter(h => h.dc === dc).length;
    if (countEl) countEl.textContent = `${n} entrega${n !== 1 ? 's' : ''}`;
  });
  // Update DC completion status
  updateDCStatus();
}

function renderStats() {
  const el = document.getElementById('stats');
  const today = dateKey(new Date());
  const thisWeek = getWeekRange();
  const weekCount = allHandovers.filter(h => h.fecha >= thisWeek.from && h.fecha <= thisWeek.to).length;
  
  el.innerHTML = `
    <div class="stat-card"><div class="stat-val">${allHandovers.length}</div><div class="stat-lbl">Total entregas</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--cyan)">${allHandovers.filter(h => h.dc === 'SanMartin').length}</div><div class="stat-lbl">San Martín</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--indigo)">${allHandovers.filter(h => h.dc === 'Apoquindo').length}</div><div class="stat-lbl">Apoquindo</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--green)">${allHandovers.filter(h => h.dc === 'Paine').length}</div><div class="stat-lbl">Paine</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--amber)">${allHandovers.filter(h => h.fecha === today).length}</div><div class="stat-lbl">Hoy</div></div>
    <div class="stat-card"><div class="stat-val" style="color:var(--sky)">${weekCount}</div><div class="stat-lbl">Esta semana</div></div>`;
}

function renderLastHandover(dc) {
  const container = document.getElementById('last-' + dc);
  if (!container) return;
  const dcH = handovers.filter(h => h.dc === dc).sort(sortDesc);
  if (dcH.length === 0) { container.innerHTML = ''; return; }

  const h = dcH[0];
  const turnoShort = h.turno?.split('(')[0]?.trim() || '';
  const turnoName = h.turno?.match(/\(([^)]+)\)/)?.[1] || '';
  const d = new Date(h.fecha + 'T12:00:00');
  const fechaLabel = d.toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long' });

  container.innerHTML = `<div class="last-handover">
    <div class="last-title"><span class="pulse-dot"></span> Última entrega registrada</div>
    <div class="last-grid">
      <span class="last-label">📅 Fecha</span>
      <span class="last-val">${fechaLabel}</span>
      <span class="last-label">🔄 Turno</span>
      <span class="last-val">${turnoShort} ${turnoName ? '(' + turnoName + ')' : ''}</span>
      <span class="last-label">👤 Entrega</span>
      <span class="last-val"><strong>${h.entrega}</strong></span>
      <span class="last-label">👤 Recibe</span>
      <span class="last-val"><strong>${h.recibe}</strong></span>
    </div>
    ${(h.trabajos || h.pendientes) ? `<div class="last-preview">
      ${h.trabajos ? `<div class="last-prev-box done">
        <div class="last-prev-label">✅ Trabajos realizados</div>
        ${esc(h.trabajos).substring(0, 150)}${h.trabajos.length > 150 ? '…' : ''}
      </div>` : ''}
      ${h.pendientes ? `<div class="last-prev-box pending">
        <div class="last-prev-label">⏳ Pendientes</div>
        ${esc(h.pendientes).substring(0, 150)}${h.pendientes.length > 150 ? '…' : ''}
      </div>` : ''}
    </div>` : ''}
  </div>`;
}

function renderList(dc) {
  const list = document.getElementById('list-' + dc);
  if (!list) return;

  const fromDate = document.getElementById('from-' + dc)?.value || '';
  const toDate = document.getElementById('to-' + dc)?.value || '';

  let items = handovers.filter(h => h.dc === dc);
  if (fromDate) items = items.filter(h => h.fecha >= fromDate);
  if (toDate) items = items.filter(h => h.fecha <= toDate);
  items.sort(sortDesc);

  const total = handovers.filter(h => h.dc === dc).length;

  if (items.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="empty-icon">${total > 0 ? '🔍' : '📋'}</span>
      <div class="empty-title">${total > 0 ? 'Sin resultados filtrados' : 'Sin entregas registradas'}</div>
      <div class="empty-sub">${total > 0 ? 'Ajusta los filtros para ver más resultados' : 'Haz clic en "+ Nueva Entrega" para registrar la primera'}</div>
    </div>`;
    return;
  }

  let html = '';
  let lastDate = '';

  items.forEach(h => {
    if (h.fecha !== lastDate) {
      const d = new Date(h.fecha + 'T12:00:00');
      html += `<div class="date-sep">${d.toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })}</div>`;
      lastDate = h.fecha;
    }

    const cls = getShiftClass(h.turno);
    const turnoShort = h.turno?.split('(')[0]?.trim() || h.turno || '—';
    const turnoName = h.turno?.match(/\(([^)]+)\)/)?.[1] || '';

    html += `<div class="ho-card ${DC_CARD_CLASS[dc]}" id="card-${h.id}">
      <div class="ho-header" onclick="toggleCard('${h.id}')">
        <span class="shift-badge ${cls}">${turnoShort}</span>
        <div class="ho-meta">
          <div class="ho-date">${h.fecha} ${turnoName ? '· ' + turnoName : ''}</div>
          <div class="ho-people">
            <strong>${h.entrega}</strong>
            <span class="ho-arrow">→</span>
            <strong>${h.recibe}</strong>
          </div>
        </div>
        <div class="ho-actions">
          <button class="ho-btn-sm" onclick="event.stopPropagation();editHandover('${h.id}')" title="Editar">✏️</button>
          <button class="ho-btn-sm ho-btn-del" onclick="event.stopPropagation();quickDelete('${h.id}')" title="Eliminar">🗑</button>
          <span class="ho-toggle">▼</span>
        </div>
      </div>
      <div class="ho-body">
        ${h.trabajos ? `<div class="ho-section">
          <div class="ho-section-title done">✅ Trabajos realizados</div>
          <div class="ho-section-content done">${esc(h.trabajos)}</div>
        </div>` : ''}
        ${h.ejecucion ? `<div class="ho-section">
          <div class="ho-section-title running">🔧 Trabajos en ejecución</div>
          <div class="ho-section-content running">${esc(h.ejecucion)}</div>
        </div>` : ''}
        ${h.pendientes ? `<div class="ho-section">
          <div class="ho-section-title pending">⏳ Actividades pendientes</div>
          <div class="ho-section-content pending">${esc(h.pendientes)}</div>
        </div>` : ''}
        ${h.observaciones ? `<div class="ho-section">
          <div class="ho-section-title obs">📝 Observaciones</div>
          <div class="ho-section-content obs">${esc(h.observaciones)}</div>
        </div>` : ''}
        ${!h.trabajos && !h.ejecucion && !h.pendientes && !h.observaciones ? '<div style="color:var(--text3);font-size:12px;text-align:center;padding:12px">Sin detalles registrados</div>' : ''}
      </div>
    </div>`;
  });

  list.innerHTML = html;
}

// ── Card Toggle ──
function toggleCard(id) {
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('open');
}

// ── Modal ──
function openAdd(dc) {
  document.getElementById('edit-id').value = '';
  document.getElementById('modal-dc').value = dc;
  document.getElementById('modal-title').textContent = 'Nueva Entrega de Turno';
  document.getElementById('modal-sub').textContent = `Registrar informe — ${DC_LABELS[dc]}`;

  document.getElementById('modal-badge').innerHTML = `<span class="dc-badge ${DC_BADGE_CLASS[dc]}">${DC_LABELS[dc]}</span>`;

  const now = new Date();
  document.getElementById('ho-fecha').value = dateKey(now);

  const hour = now.getHours();
  const sel = document.getElementById('ho-turno');
  if (hour >= 22 || hour < 8) sel.value = '22:15-8:00 (Noche)';
  else if (hour >= 12) sel.value = '12:30-22:15 (Tarde)';
  else sel.value = '8:00-17:45 (Mañana)';

  populateWorkers(dc);

  document.getElementById('ho-trabajos').value = '';
  document.getElementById('ho-ejecucion').value = '';
  document.getElementById('ho-pendientes').value = '';
  document.getElementById('ho-observaciones').value = '';

  document.getElementById('modal').classList.add('open');
}

function editHandover(id) {
  const h = handovers.find(x => x.id === id);
  if (!h) return;

  document.getElementById('edit-id').value = id;
  document.getElementById('modal-dc').value = h.dc;
  document.getElementById('modal-title').textContent = 'Editar Entrega de Turno';
  document.getElementById('modal-sub').textContent = `Editando informe — ${DC_LABELS[h.dc]}`;

  document.getElementById('modal-badge').innerHTML = `<span class="dc-badge ${DC_BADGE_CLASS[h.dc]}">${DC_LABELS[h.dc]}</span>`;

  document.getElementById('ho-fecha').value = h.fecha;
  document.getElementById('ho-turno').value = h.turno || '';

  populateWorkers(h.dc);

  document.getElementById('ho-entrega').value = h.entrega;
  document.getElementById('ho-recibe').value = h.recibe;
  document.getElementById('ho-trabajos').value = h.trabajos || '';
  document.getElementById('ho-ejecucion').value = h.ejecucion || '';
  document.getElementById('ho-pendientes').value = h.pendientes || '';
  document.getElementById('ho-observaciones').value = h.observaciones || '';

  document.getElementById('modal').classList.add('open');
}

function populateWorkers(dc) {
  const entSel = document.getElementById('ho-entrega');
  const recSel = document.getElementById('ho-recibe');

  let opts = `<optgroup label="${DC_LABELS[dc]}">`;
  (WORKERS[dc] || []).forEach(w => { opts += `<option value="${w.name}">${w.name} (${w.role})</option>`; });
  opts += `</optgroup>`;
  DC_LIST.filter(d => d !== dc).forEach(d => {
    opts += `<optgroup label="${DC_LABELS[d]}">`;
    (WORKERS[d] || []).forEach(w => { opts += `<option value="${w.name}">${w.name} (${w.role})</option>`; });
    opts += `</optgroup>`;
  });
  entSel.innerHTML = opts;
  recSel.innerHTML = opts;

  if ((WORKERS[dc] || []).length >= 2) recSel.selectedIndex = 1;
}

async function saveHandover() {
  const dc = document.getElementById('modal-dc').value;
  const fecha = document.getElementById('ho-fecha').value;
  const hora = ''; // Removed from UI
  const turno = document.getElementById('ho-turno').value;
  const entrega = document.getElementById('ho-entrega').value;
  const recibe = document.getElementById('ho-recibe').value;
  const trabajos = document.getElementById('ho-trabajos').value.trim();
  const ejecucion = document.getElementById('ho-ejecucion').value.trim();
  const pendientes = document.getElementById('ho-pendientes').value.trim();
  const observaciones = document.getElementById('ho-observaciones').value.trim();

  if (!fecha || !entrega || !recibe) {
    alert('Completa al menos: fecha, quién entrega y quién recibe.');
    return;
  }
  if (entrega === recibe) {
    alert('La persona que entrega y recibe no pueden ser la misma.');
    return;
  }

  const editId = document.getElementById('edit-id').value;

  if (editId) {
    const idx = handovers.findIndex(h => h.id === editId);
    if (idx >= 0) {
      handovers[idx] = { ...handovers[idx], dc, fecha, hora, turno, entrega, recibe, trabajos, ejecucion, pendientes, observaciones };
      const idxAll = allHandovers.findIndex(h => h.id === editId);
      if (idxAll >= 0) allHandovers[idxAll] = handovers[idx];
      await apiUpdate(handovers[idx]);
    }
  } else {
    const h = {
      id: 'ho_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6),
      dc, fecha, hora, turno, entrega, recibe, trabajos, ejecucion, pendientes, observaciones,
      created_at: new Date().toISOString(), status: 'active'
    };
    handovers.push(h);
    allHandovers.push(h);
    await apiSave(h);
  }

  closeModal();
  render();
  showToast(`✅ Entrega ${editId ? 'actualizada' : 'registrada'} — ${DC_LABELS[dc]}`);
}

async function quickDelete(id) {
  const h = handovers.find(x => x.id === id);
  if (!h) return;
  
  if (!confirm(`¿Estás seguro de eliminar la entrega de ${h.entrega} → ${h.recibe}?`)) return;

  try {
    await apiDelete(id);
  } catch(e) { console.warn(e); }
  
  handovers = handovers.filter(x => x.id !== id);
  allHandovers = allHandovers.filter(x => x.id !== id);
  render();
  showToast('🗑 Entrega eliminada');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ── Print ──

  const rows = dcH.map((h, i) => `
    <div style="border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:14px;page-break-inside:avoid">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-bottom:2px solid #22d3ee;padding-bottom:8px">
        <div>

          <span style="color:#888;font-size:12px;margin-left:12px">${h.fecha}</span>

      </div>

      ${h.ejecucion ? `<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#0284c7;text-transform:uppercase;margin-bottom:4px">🔧 Trabajos en ejecución</div><div style="background:#f0f9ff;border:1px solid #bae6fd;border-left:3px solid #38bdf8;padding:10px 14px;border-radius:6px;font-size:13px;white-space:pre-wrap;line-height:1.6">${h.ejecucion}</div></div>` : ''}
      ${h.pendientes ? `<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#d97706;text-transform:uppercase;margin-bottom:4px">⏳ Actividades pendientes</div><div style="background:#fffbeb;border:1px solid #fde68a;border-left:3px solid #f59e0b;padding:10px 14px;border-radius:6px;font-size:13px;white-space:pre-wrap;line-height:1.6">${h.pendientes}</div></div>` : ''}
      ${h.observaciones ? `<div><div style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:4px">📝 Observaciones</div><div style="background:#f9fafb;border:1px solid #e5e7eb;border-left:3px solid #9ca3af;padding:10px 14px;border-radius:6px;font-size:13px;white-space:pre-wrap;line-height:1.6">${h.observaciones}</div></div>` : ''}
    </div>
  `).join('');

  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(`<!DOCTYPE html><html><head><title>Informe Entrega de Turno — ${DC_LABELS[dc]}</title>
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;padding:30px;color:#1a1a1a;font-size:14px}@media print{body{padding:15px}@page{size:A4;margin:15mm}}</style></head><body>
    <div style="text-align:center;margin-bottom:24px;border-bottom:3px solid #22d3ee;padding-bottom:16px">
      <h1 style="font-size:22px;color:#0e7490;margin-bottom:4px">⚡ Informe de Entrega de Turno</h1>
      <h2 style="font-size:16px;color:#374151;font-weight:600">${DC_LABELS[dc]}</h2>
      <p style="font-size:12px;color:#6b7280;margin-top:4px">Generado el ${new Date().toLocaleDateString('es-CL', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' })} — ${dcH.length} entrega(s)</p>
    </div>
    ${rows}
    <div style="text-align:center;margin-top:20px;font-size:11px;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:10px">

// ── Toast ──
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ══════════════════════════════════════════════════════
// ══  DC COMPLETION STATUS + PDF GENERATION           ══
// ══════════════════════════════════════════════════════

function getLatestHandover(dc) {
  // Get the most recent handover for this DC, regardless of date
  return handovers
    .filter(h => h.dc === dc)
    .sort(sortDesc)[0] || null;
}

function updateDCStatus() {
  let allComplete = true;

  DC_LIST.forEach(dc => {
    const h = getLatestHandover(dc);
    const card = document.getElementById('status-' + dc);
    const icon = card?.querySelector('.dc-status-icon');
    const detail = document.getElementById('status-detail-' + dc);

    if (h) {
      card.classList.add('complete');
      icon.className = 'dc-status-icon done';
      icon.textContent = '✅';
      detail.textContent = `${h.entrega} → ${h.recibe} · ${h.fecha} · ${h.turno?.split('(')[0]?.trim() || ''}`;
    } else {
      card.classList.remove('complete');
      icon.className = 'dc-status-icon pending';
      icon.textContent = '⏳';
      detail.textContent = 'Pendiente — sin entregas registradas';
      allComplete = false;
    }
  });

  const dlBtn = document.getElementById('download-btn');
  const subEl = document.querySelector('.send-panel-sub');
  if (allComplete) {
    dlBtn.disabled = false;
    subEl.textContent = '✅ Los 3 Data Centers tienen entregas — listo para generar reporte';
    subEl.style.color = 'var(--green)';
  } else {
    dlBtn.disabled = true;
    const pending = DC_LIST.filter(dc => !getLatestHandover(dc));
    subEl.textContent = `Faltan ${pending.length} DC: ${pending.map(dc => DC_LABELS[dc]).join(', ')}`;
    subEl.style.color = '';
  }
}

// ── Download Consolidated Report as PDF ──
function downloadConsolidatedReport() {
  const htmlContent = buildPrintHTML();
  const d = new Date();
  const filename = `Entrega_Turno_${dateKey(d)}.pdf`;

  showToast('⏳ Generando PDF...');

  const opt = {
    margin:       [10, 12, 10, 12],
    filename:     filename,
    image:        { type: 'jpeg', quality: 0.98 },
    html2canvas:  { scale: 2, useCORS: true, backgroundColor: '#ffffff', scrollY: 0 },
    jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' },
    pagebreak:    { mode: ['avoid-all', 'css', 'legacy'] }
  };

  html2pdf().set(opt).from(htmlContent).save().then(async () => {
    showToast(`📥 PDF descargado: ${filename}`);
    
    // Esperamos 1 segundo y reseteamos todo a cero
    setTimeout(async () => {
      await apiDeleteAll();
      allHandovers.forEach(h => h.status = 'archived');
      handovers = [];
      render();
      showToast('🔄 La aplicación ha partido nuevamente de cero');
    }, 1500);

  }).catch(err => {
    console.error('PDF error', err);
    showToast('❌ Error al generar PDF');
  });
}

// ── Helpers ──
function esc(s) { return (s || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
function dateKey(d) { return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
function pad(n) { return String(n).padStart(2, '0'); }
function sortDesc(a, b) {
  return (`${b.fecha} ${b.hora || '00:00'}`).localeCompare(`${a.fecha} ${a.hora || '00:00'}`);
}
function getShiftClass(turno) {
  if (!turno) return 'dia';
  if (turno.includes('Mañana') || turno.includes('8:00-17')) return 'manana';
  if (turno.includes('Tarde') || turno.includes('12:30')) return 'tarde';
  if (turno.includes('Noche') && !turno.includes('PT')) return 'noche';
  if (turno.includes('PT Día') || turno.includes('08:00-20')) return 'ptday';
  if (turno.includes('PT Noche') || turno.includes('20:00-08')) return 'ptnight';
  return 'dia';
}
function getWeekRange() {
  const now = new Date();
  const day = now.getDay() || 7;
  const mon = new Date(now);
  mon.setDate(now.getDate() - day + 1);
  const sun = new Date(mon);
  sun.setDate(mon.getDate() + 6);
  return { from: dateKey(mon), to: dateKey(sun) };
}

// Close modals on outside click
document.addEventListener('click', e => {
  if (e.target.id === 'modal') closeModal();
});
