<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrega de Turno — Data Centers</title>
  <meta name="description" content="Sistema de entrega de turno para Data Centers: San Martín, Apoquindo y Paine">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
  <style>
:root {
  --bg-color: #0b1120;
  --surface1: #111827;
  --surface2: #1f2937;
  --surface3: #374151;
  --border: rgba(255, 255, 255, 0.08);
  --text1: #f3f4f6;
  --text2: #9ca3af;
  --text3: #6b7280;
  --primary: #06b6d4;
  --primary-hover: #0891b2;
  --primary-bg: rgba(6, 182, 212, 0.1);
  --green: #34d399;
  --green-bg: rgba(52, 211, 153, 0.1);
  --cyan: #22d3ee;
  --cyan-bg: rgba(34, 211, 238, 0.1);
  --indigo: #818cf8;
  --indigo-bg: rgba(129, 140, 248, 0.1);
  --amber: #fbbf24;
  --amber-bg: rgba(251, 191, 36, 0.1);
  --rose: #fb7185;
  --rose-bg: rgba(251, 113, 133, 0.1);
  --teal: #2dd4bf;
  --teal-bg: rgba(45, 212, 191, 0.1);
  --sky: #38bdf8;
  --sky-bg: rgba(56, 189, 248, 0.1);
  --max-w: 1200px;
  --modal-w: 750px;
  --radius: 12px;
  --font-sans: 'DM Sans', system-ui, -apple-system, sans-serif;
  --font-mono: 'Space Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background-color: var(--bg-color);
  color: var(--text1);
  min-height: 100vh;
  line-height: 1.5;
  padding-bottom: 60px;
}
::selection { background: var(--primary-bg); color: var(--primary); }

/* ── HEADER ── */
.header {
  border-bottom: 1px solid var(--border);
  padding: 16px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
  background: rgba(17, 24, 39, 0.85);
}
.header-logo { display: flex; align-items: center; gap: 16px; }
.logo-icon {
  background: linear-gradient(135deg, var(--primary), var(--indigo));
  width: 42px; height: 42px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
}
.logo-title { font-size: 18px; font-weight: 700; color: var(--text1); letter-spacing: -0.5px; }
.logo-sub { font-size: 12px; color: var(--text2); }
.header-right {
  display: flex; align-items: center; gap: 20px;
  font-family: var(--font-mono); font-size: 13px; color: var(--text2);
}
.header-status {
  background: var(--green-bg); color: var(--green);
  padding: 6px 12px; border-radius: 20px;
  display: flex; align-items: center; gap: 8px;
  border: 1px solid rgba(52,211,153,.2);
}
.pulse-dot {
  width: 8px; height: 8px;
  background: var(--green); border-radius: 50%;
  box-shadow: 0 0 0 0 rgba(52, 211, 153, 0.7);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%   { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52,211,153,0.7); }
  70%  { transform: scale(1);    box-shadow: 0 0 0 6px rgba(52,211,153,0); }
  100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(52,211,153,0); }
}

/* ── LAYOUT ── */
.container { max-width: var(--max-w); margin: 0 auto; padding: 32px 20px; }

/* ── SEND PANEL ── */
.send-panel {
  background: var(--surface1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px; margin-bottom: 32px;
  box-shadow: 0 8px 30px rgba(0,0,0,.2);
}
.send-panel-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.send-panel-title { font-size: 18px; font-weight: 700; color: var(--text1); display: flex; align-items: center; gap: 8px; }
.send-panel-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }
.dc-status-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.dc-status-card {
  background: var(--bg-color);
  border: 1px solid var(--border);
  padding: 16px; border-radius: 10px; transition: all .3s;
}
.dc-status-card.complete {
  border-color: rgba(52,211,153,.3);
  background: linear-gradient(to bottom right, var(--bg-color), rgba(52,211,153,.05));
}
.dc-status-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.dc-status-title { font-weight: 600; font-size: 14px; }
.dc-status-icon {
  width: 24px; height: 24px; border-radius: 6px;
  display: flex; align-items: center; justify-content: center; font-size: 12px;
}
.dc-status-icon.pending { background: var(--surface3); }
.dc-status-icon.done { background: var(--green); color: #000; box-shadow: 0 0 10px rgba(52,211,153,.4); }
.dc-status-detail { font-size: 12px; color: var(--text3); }
.dc-status-card.complete .dc-status-detail { color: var(--green); }

/* ── TABS ── */
.tabs {
  display: flex; gap: 12px; margin-bottom: 24px;
  border-bottom: 1px solid var(--border); padding-bottom: 1px;
}
.tab {
  background: transparent; color: var(--text2); border: none;
  font-family: var(--font-sans); font-size: 15px; font-weight: 600;
  padding: 14px 24px; cursor: pointer;
  border-bottom: 3px solid transparent; transition: all .2s;
  display: flex; align-items: center; gap: 10px;
}
.tab:hover { color: var(--text1); }
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.tab-count {
  background: var(--surface3); color: var(--text1);
  padding: 2px 8px; border-radius: 10px; font-size: 11px; transition: all .2s;
}
.tab.active .tab-count { background: var(--primary-bg); color: var(--primary); }
#tab-SanMartin.active { color: var(--cyan); border-bottom-color: var(--cyan); }
#tab-SanMartin.active .tab-count { background: var(--cyan-bg); color: var(--cyan); }
#tab-Apoquindo.active { color: var(--indigo); border-bottom-color: var(--indigo); }
#tab-Apoquindo.active .tab-count { background: var(--indigo-bg); color: var(--indigo); }
#tab-Paine.active { color: var(--green); border-bottom-color: var(--green); }
#tab-Paine.active .tab-count { background: var(--green-bg); color: var(--green); }

/* ── PANELS ── */
.panel { display: none; }
.panel.active { display: block; animation: fadeUp .4s ease; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── TOOLBAR ── */
.toolbar {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 24px; background: var(--surface1);
  padding: 16px; border-radius: var(--radius); border: 1px solid var(--border);
}
.toolbar-left, .toolbar-right { display: flex; gap: 12px; align-items: center; }

/* ── FORMS & INPUTS ── */
.filter-input {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text1); padding: 10px 14px; border-radius: 8px;
  font-family: var(--font-sans); font-size: 14px; transition: all .2s;
}
.filter-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-bg); }
select.filter-input { cursor: pointer; }

/* ── BUTTONS ── */
.btn {
  padding: 10px 20px; border: none; border-radius: 8px;
  font-family: var(--font-sans); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .2s;
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: #0b1120; }
.btn-primary:hover { background: var(--primary-hover); box-shadow: 0 4px 12px var(--primary-bg); }
.btn-secondary { background: var(--surface3); color: var(--text1); }
.btn-secondary:hover { background: var(--border); }
.btn-print { background: transparent; color: var(--text2); border: 1px solid var(--surface3); }
.btn-print:hover { color: var(--text1); border-color: var(--text1); }
.btn-download {
  padding: 12px 24px; border: none; border-radius: 10px;
  font-size: 14px; font-weight: 700; font-family: 'DM Sans', sans-serif;
  cursor: pointer; transition: all .3s;
  display: inline-flex; align-items: center; gap: 8px;
  background: linear-gradient(135deg, var(--green), var(--teal));
  color: #0a0f1c;
  box-shadow: 0 4px 16px rgba(52,211,153,.3); white-space: nowrap;
}
.btn-download:hover:not(:disabled) {
  transform: translateY(-2px); box-shadow: 0 6px 24px rgba(52,211,153,.4); filter: brightness(1.1);
}
.btn-download:disabled { opacity: .4; cursor: not-allowed; filter: grayscale(.5); box-shadow: none; }

/* ── BADGES ── */
.dc-badge {
  display: inline-flex; align-items: center;
  padding: 4px 10px; border-radius: 6px;
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
}
.dc-badge.sm { background: var(--cyan-bg); color: var(--cyan); border: 1px solid rgba(34,211,238,.2); }
.dc-badge.aq { background: var(--indigo-bg); color: var(--indigo); border: 1px solid rgba(129,140,248,.2); }
.dc-badge.pn { background: var(--green-bg); color: var(--green); border: 1px solid rgba(52,211,153,.2); }
.shift-badge { font-family: var(--font-mono); font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 700; }
.shift-badge.manana  { background: var(--amber-bg); color: var(--amber); }
.shift-badge.tarde   { background: var(--primary-bg); color: var(--primary); }
.shift-badge.noche   { background: var(--indigo-bg); color: var(--indigo); }
.shift-badge.ptday   { background: var(--teal-bg); color: var(--teal); }
.shift-badge.ptnight { background: var(--rose-bg); color: var(--rose); }

/* ── LAST HANDOVER ── */
.last-handover {
  background: linear-gradient(180deg, rgba(6,182,212,0.05) 0%, rgba(6,182,212,0) 100%);
  border: 1px solid rgba(6,182,212,0.2);
  border-radius: var(--radius); padding: 24px; margin-bottom: 32px;
  position: relative; overflow: hidden;
}
.last-handover::before {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--primary);
}
.last-title {
  font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
}
.last-grid { display: grid; grid-template-columns: auto 1fr; column-gap: 32px; row-gap: 12px; }
.last-label { color: var(--text3); font-size: 13px; display: flex; align-items: center; gap: 6px; }
.last-val { color: var(--text1); font-size: 14px; }
.last-preview {
  margin-top: 20px; border-top: 1px dashed var(--border); padding-top: 20px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px;
}
.last-prev-box { padding: 12px 16px; border-radius: 8px; font-size: 13px; line-height: 1.6; }
.last-prev-box.done    { background: var(--green-bg); border-left: 3px solid var(--green); color: var(--text2); }
.last-prev-box.pending { background: var(--amber-bg); border-left: 3px solid var(--amber); color: var(--text2); }
.last-prev-label { font-size: 11px; font-weight: 700; margin-bottom: 6px; color: var(--text1); }

/* ── HANDOVER LIST ── */
.date-sep {
  font-size: 11px; font-weight: 800; color: var(--text3);
  text-transform: uppercase; letter-spacing: 2px;
  margin: 32px 0 16px 0;
  display: flex; align-items: center; gap: 12px;
}
.date-sep::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.ho-card {
  background: var(--surface1); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 12px; transition: all .2s; overflow: hidden;
}
.ho-card:hover { border-color: rgba(255,255,255,0.2); }
.ho-card.dc-sm:hover { border-color: rgba(34,211,238,.4); }
.ho-card.dc-aq:hover { border-color: rgba(129,140,248,.4); }
.ho-card.dc-pn:hover { border-color: rgba(52,211,153,.4); }
.ho-header { padding: 16px 20px; display: flex; align-items: center; gap: 20px; cursor: pointer; }
.ho-meta { flex: 1; }
.ho-date { font-size: 13px; color: var(--text2); margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
.ho-people { font-size: 15px; color: var(--text1); display: flex; align-items: center; gap: 12px; }
.ho-arrow { color: var(--text3); }
.ho-actions { display: flex; align-items: center; gap: 12px; }
.ho-btn-sm {
  background: transparent; border: 1px solid var(--border); color: var(--text2);
  width: 32px; height: 32px; border-radius: 6px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.ho-btn-sm:hover { background: var(--surface3); color: var(--text1); }
.ho-btn-del:hover { background: var(--rose-bg) !important; color: var(--rose) !important; border-color: rgba(251,113,133,.3) !important; }
.ho-toggle { font-size: 11px; color: var(--text3); transition: transform .3s; }
.ho-card.open .ho-toggle { transform: rotate(180deg); }
.ho-body {
  padding: 0 20px; max-height: 0; overflow: hidden; opacity: 0;
  transition: all .3s ease; background: var(--bg-color);
}
.ho-card.open .ho-body {
  padding: 20px; max-height: 2000px; opacity: 1; border-top: 1px solid var(--border);
}
.ho-section { margin-bottom: 20px; }
.ho-section:last-child { margin-bottom: 0; }
.ho-section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; }
.ho-section-title.done    { color: var(--green); }
.ho-section-title.pending { color: var(--amber); }
.ho-section-title.running { color: var(--sky); }
.ho-section-title.obs     { color: var(--text3); }
.ho-section-content {
  background: var(--surface1); padding: 14px 18px; border-radius: 8px;
  font-size: 14px; line-height: 1.6; white-space: pre-wrap; color: var(--text1);
  border: 1px solid var(--border);
}
.ho-section-content.done    { border-left: 3px solid var(--green); }
.ho-section-content.running { border-left: 3px solid var(--sky); }
.ho-section-content.pending { border-left: 3px solid var(--amber); }
.ho-section-content.obs     { border-left: 3px solid var(--text3); }
.empty-state {
  text-align: center; padding: 60px 20px;
  background: var(--surface1); border-radius: var(--radius);
  border: 1px dashed var(--surface3);
}
.empty-icon { font-size: 40px; margin-bottom: 16px; display: block; opacity: .5; }
.empty-title { font-size: 16px; font-weight: 600; margin-bottom: 8px; color: var(--text2); }
.empty-sub { font-size: 14px; color: var(--text3); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  z-index: 1000; display: flex; justify-content: center; align-items: flex-start;
  padding: 40px 20px; opacity: 0; visibility: hidden; transition: all .3s; overflow-y: auto;
}
.modal-overlay.open { opacity: 1; visibility: visible; }
.modal {
  background: var(--bg-color); width: var(--modal-w); border-radius: 16px;
  border: 1px solid var(--border); padding: 32px;
  box-shadow: 0 20px 40px rgba(0,0,0,.4);
  transform: translateY(-20px); transition: all .3s;
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal h2 { font-size: 22px; margin-bottom: 4px; }
.modal-sub { font-size: 14px; color: var(--text3); margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 8px; }
.form-section { margin-bottom: 24px; padding: 20px; border-radius: 8px; }
.form-section label { display: block; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 12px; letter-spacing: .6px; }
.form-section.done    { background: var(--green-bg); color: var(--green); border-top: 1px solid rgba(52,211,153,.15); border-bottom: 1px solid rgba(52,211,153,.15); }
.form-section.running { background: var(--sky-bg); color: var(--sky); border-top: 1px solid rgba(56,189,248,.15); border-bottom: 1px solid rgba(56,189,248,.15); }
.form-section.pending { background: var(--amber-bg); color: var(--amber); border-top: 1px solid rgba(245,158,11,.15); border-bottom: 1px solid rgba(245,158,11,.15); }
.form-section.obs     { background: var(--surface3); color: var(--text3); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
textarea {
  width: 100%; background: var(--surface1); border: 1px solid var(--border);
  color: var(--text1); border-radius: 6px; padding: 12px;
  font-family: var(--font-sans); font-size: 14px; resize: vertical; min-height: 80px;
}
textarea:focus { outline: none; border-color: currentColor; }
.modal-actions {
  display: flex; justify-content: flex-end; gap: 12px;
  margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border);
}

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface1); color: var(--text1);
  padding: 12px 24px; border-radius: 30px;
  box-shadow: 0 10px 30px rgba(0,0,0,.5);
  border: 1px solid var(--border); font-size: 14px; font-weight: 600;
  z-index: 10000; opacity: 0;
  transition: all .4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

/* ── RESPONSIVE ── */
@media (max-width: 900px) {
  .stats-row { grid-template-columns: repeat(3, 1fr); }
  .form-grid { grid-template-columns: 1fr; gap: 0; }
  .tabs { flex-direction: column; }
  .tab { width: 100%; justify-content: space-between; }
  .toolbar { flex-direction: column; gap: 16px; align-items: stretch; }
  .toolbar-left, .toolbar-right { width: 100%; flex-wrap: wrap; }
  .toolbar-left input { flex: 1; }
  .last-grid { grid-template-columns: 1fr; gap: 8px; }
  .last-preview { grid-template-columns: 1fr; }
  .modal { width: 100%; padding: 20px; }
  .dc-status-row { grid-template-columns: 1fr; }
  .send-panel-header { flex-direction: column; gap: 16px; align-items: stretch; }
}

/* ── PRINT ── */
@media print {
  body { background: #fff; color: #000; padding: 0; }
  .header, .stats-row, .tabs, .toolbar, .ho-actions, .send-panel, #toast { display: none !important; }
  .container { padding: 0; }
  .ho-card { border: 1px solid #ccc; break-inside: avoid; margin-bottom: 20px; }
  .ho-body { max-height: none !important; opacity: 1 !important; display: block !important; border-top: none; }
  .ho-section-content { background: #fff; color: #000; border: 1px solid #ddd; }
  .shift-badge { border: 1px solid #333; color: #333; background: transparent; }
}
  </style>
</head>
<body>

<!-- HEADER -->
<header class="header">
  <div class="header-logo">
    <div class="logo-icon">🔄</div>
    <div class="logo-text">
      <div class="logo-title">Entrega de Turno</div>
      <div class="logo-sub">Data Centers · San Martín · Apoquindo · Paine</div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-time" id="header-time">--:--</div>
    <div class="header-status"><span class="pulse-dot"></span> Conectado</div>
  </div>
</header>

<div class="container">
  <!-- CONSOLIDATION PANEL -->
  <div class="send-panel">
    <div class="send-panel-header">
      <div>
        <div class="send-panel-title">📨 Informe Consolidado de Entrega de Turno</div>
        <div class="send-panel-sub" id="send-panel-sub">Los 3 Data Centers deben completar su entrega antes de generar el informe</div>
      </div>
      <div>
        <button class="btn btn-download" id="download-btn" onclick="downloadConsolidatedReport()" disabled>
          📥 Descargar PDF Consolidado
        </button>
      </div>
    </div>
    <div class="dc-status-row">
      <div class="dc-status-card" id="status-SanMartin">
        <div class="dc-status-header">
          <div class="dc-status-title">🏢 DC San Martín</div>
          <div class="dc-status-icon pending" id="icon-SanMartin">⏳</div>
        </div>
        <div class="dc-status-detail" id="status-detail-SanMartin">Pendiente</div>
      </div>
      <div class="dc-status-card" id="status-Apoquindo">
        <div class="dc-status-header">
          <div class="dc-status-title">🏢 DC Apoquindo</div>
          <div class="dc-status-icon pending" id="icon-Apoquindo">⏳</div>
        </div>
        <div class="dc-status-detail" id="status-detail-Apoquindo">Pendiente</div>
      </div>
      <div class="dc-status-card" id="status-Paine">
        <div class="dc-status-header">
          <div class="dc-status-title">🏢 DC Paine</div>
          <div class="dc-status-icon pending" id="icon-Paine">⏳</div>
        </div>
        <div class="dc-status-detail" id="status-detail-Paine">Pendiente</div>
      </div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs">

<script>
// ══════════════════════════════════════════════════
// ENTREGA DE TURNO — Firebase Realtime Database
// Sincronización en tiempo real entre los 3 DC
// ══════════════════════════════════════════════════

// ┌──────────────────────────────────────────────┐
// │  🔧 CONFIGURACIÓN DE FIREBASE                │
// │  Reemplaza estos valores con los de tu       │
// │  proyecto en console.firebase.google.com     │
// └──────────────────────────────────────────────┘
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBYPcIT_BDJtz6RU5fsO8qkpIB0eD1Jz64",
  authDomain: "entrega-turnos-59960.firebaseapp.com",
  databaseURL: "https://entrega-turnos-59960-default-rtdb.firebaseio.com",
  projectId: "entrega-turnos-59960",
  storageBucket: "entrega-turnos-59960.firebasestorage.app",
  messagingSenderId: "145292534059",
  appId: "1:145292534059:web:eb36147796524a8db1e56e"
};

// Initialize Firebase
let firebaseApp, firebaseDB, firebaseRef;
let firebaseConnected = false;

try {
  firebaseApp = firebase.initializeApp(FIREBASE_CONFIG);
  firebaseDB  = firebase.database();
  firebaseRef = firebaseDB.ref('handovers');
  firebaseConnected = true;
} catch(e) {
  console.warn('⚠️ Firebase no configurado. Usando modo offline (localStorage).', e);
  firebaseConnected = false;
}

const DC_LIST        = ['SanMartin','Apoquindo','Paine'];
const DC_LABELS      = { SanMartin: 'DC San Martín', Apoquindo: 'DC Apoquindo', Paine: 'DC Paine' };
const DC_BADGE_CLASS = { SanMartin: 'sm', Apoquindo: 'aq', Paine: 'pn' };
const DC_CARD_CLASS  = { SanMartin: 'dc-sm', Apoquindo: 'dc-aq', Paine: 'dc-pn' };
const STORAGE_KEY    = 'entrega_turno_data_v2';
const COUNTER_KEY    = 'entrega_turno_counter';

const WORKERS = {
  SanMartin: [
    { name: 'Diego Sandoval',     role: 'Operador PT' },
    { name: 'Esteban Avello',     role: 'Operador PT' },
    { name: 'Fernanda Frez',      role: 'Commodities' },
    { name: 'Francisco Feliu',    role: 'Operador' },
    { name: 'Javier Bravo',       role: 'Supervisor' },
    { name: 'Jonathan Marquez',   role: 'Commodities' },

  ],

    { name: 'Jorge Alayo',      role: 'Operador PT' },
    { name: 'Jairo Salinas',    role: 'Operador' },
    { name: 'José Márquez',     role: 'Operador' },
    { name: 'Bastian Gonzalez', role: 'Operador PT' },
    { name: 'Jeremy Salinas',   role: 'Operador PT' }
  ]
};

let handovers  = [];
let currentDC  = 'SanMartin';

// ── Init ──────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  loadHandovers();
  updateClock();
  setInterval(updateClock, 30000);
  monitorConnection();
});

function updateClock() {
  const el = document.getElementById('header-time');
  if (el) el.textContent = new Date().toLocaleString('es-CL', {
    weekday:'short', day:'numeric', month:'short', hour:'2-digit', minute:'2-digit'
  });
}

// ── Connection Monitor ───────────────────────────
function monitorConnection() {
  if (!firebaseConnected) {
    setConnectionStatus(false, 'Modo Offline');
    return;
  }
  const connRef = firebaseDB.ref('.info/connected');
  connRef.on('value', (snap) => {
    if (snap.val() === true) {
      setConnectionStatus(true, 'Conectado');
    } else {
      setConnectionStatus(false, 'Desconectado');
    }
  });
}

function setConnectionStatus(online, label) {
  const statusEl = document.querySelector('.header-status');
  const dotEl    = document.querySelector('.pulse-dot');
  if (!statusEl) return;
  if (online) {
    statusEl.style.background = 'var(--green-bg)';
    statusEl.style.color      = 'var(--green)';
    statusEl.style.borderColor = 'rgba(52,211,153,.2)';
    if (dotEl) dotEl.style.background = 'var(--green)';
  } else {
    statusEl.style.background = 'var(--rose-bg)';
    statusEl.style.color      = 'var(--rose)';
    statusEl.style.borderColor = 'rgba(251,113,133,.2)';
    if (dotEl) dotEl.style.background = 'var(--rose)';
  }
  statusEl.innerHTML = `<span class="pulse-dot" style="background:${online?'var(--green)':'var(--rose)'}"></span> ${label}`;
}

// ── Persistence (Firebase + localStorage fallback) ──
function loadHandovers() {
  // Always load from localStorage first (instant)
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    handovers = raw ? JSON.parse(raw) : [];
  } catch(e) {
    handovers = [];
  }
  render();

  // If Firebase is connected, subscribe to real-time updates
  if (firebaseConnected) {
    firebaseRef.on('value', (snapshot) => {
      const data = snapshot.val();
      if (data) {
        handovers = Object.values(data);
      } else {
        handovers = [];
      }
      // Also update localStorage as cache
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(handovers));
      } catch(e) {}
      render();
    }, (error) => {
      console.error('Firebase read error:', error);
      showToast('⚠️ Error de conexión con la base de datos');
    });
  }
}

function saveLocal() {
  // Save to localStorage (always, as cache)
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(handovers));
  } catch(e) {
    showToast('⚠️ No se pudo guardar localmente');
  }
}

function saveToFirebase() {
  if (!firebaseConnected) {
    saveLocal();
    return;
  }
  // Convert array to object keyed by id for Firebase
  const dataObj = {};
  handovers.forEach(h => { dataObj[h.id] = h; });
  firebaseRef.set(dataObj)
    .then(() => {
      saveLocal(); // also cache locally
    })
    .catch((err) => {
      console.error('Firebase write error:', err);
      saveLocal(); // fallback to local
      showToast('⚠️ Sin conexión — guardado localmente');
    });
}

// ── DC Navigation ─────────────────────────────────
function setDC(dc) {
  currentDC = dc;
  DC_LIST.forEach(d => {
    document.getElementById('tab-'   + d)?.classList.toggle('active', d === dc);
    document.getElementById('panel-' + d)?.classList.toggle('active', d === dc);
  });
  render();
}

// ── Render ────────────────────────────────────────
function render() {
  DC_LIST.forEach(dc => {
    renderLastHandover(dc);
    renderList(dc);
    const n = handovers.filter(h => h.dc === dc).length;
    const el = document.getElementById('tab-count-' + dc);
    if (el) el.textContent = `${n} entrega${n !== 1 ? 's' : ''}`;
  });
  updateDCStatus();
}

function renderLastHandover(dc) {
  const container = document.getElementById('last-' + dc);
  if (!container) return;
  const latest = handovers.filter(h => h.dc === dc).sort(sortDesc)[0];
  if (!latest) { container.innerHTML = ''; return; }

  const h = latest;
  const turnoShort = h.turno?.split('(')[0]?.trim() || '';
  const turnoName  = h.turno?.match(/\(([^)]+)\)/)?.[1] || '';
  const d = new Date(h.fecha + 'T12:00:00');
  const fechaLabel = d.toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long' });

  container.innerHTML = `<div class="last-handover">
    <div class="last-title"><span class="pulse-dot"></span> Última entrega registrada</div>
    <div class="last-grid">
      <span class="last-label">📅 Fecha</span><span class="last-val">${fechaLabel}</span>
      <span class="last-label">🔄 Turno</span><span class="last-val">${turnoShort}${turnoName?' ('+turnoName+')':''}</span>
      <span class="last-label">👤 Entrega</span><span class="last-val"><strong>${h.entrega}</strong></span>
      <span class="last-label">👤 Recibe</span><span class="last-val"><strong>${h.recibe}</strong></span>
    </div>
    ${(h.trabajos||h.pendientes) ? `<div class="last-preview">
      ${h.trabajos ? `<div class="last-prev-box done"><div class="last-prev-label">✅ Trabajos realizados</div>${esc(h.trabajos).substring(0,150)}${h.trabajos.length>150?'…':''}</div>` : ''}
      ${h.pendientes ? `<div class="last-prev-box pending"><div class="last-prev-label">⏳ Pendientes</div>${esc(h.pendientes).substring(0,150)}${h.pendientes.length>150?'…':''}</div>` : ''}
    </div>` : ''}
  </div>`;
}

function renderList(dc) {
  const list = document.getElementById('list-' + dc);
  if (!list) return;
  const fromDate = document.getElementById('from-' + dc)?.value || '';
  const toDate   = document.getElementById('to-'   + dc)?.value || '';
  let items = handovers.filter(h => h.dc === dc);
  if (fromDate) items = items.filter(h => h.fecha >= fromDate);
  if (toDate)   items = items.filter(h => h.fecha <= toDate);
  items.sort(sortDesc);

  const total = handovers.filter(h => h.dc === dc).length;
  if (items.length === 0) {
    list.innerHTML = `<div class="empty-state">
      <span class="empty-icon">${total>0?'🔍':'📋'}</span>
      <div class="empty-title">${total>0?'Sin resultados filtrados':'Sin entregas registradas'}</div>
      <div class="empty-sub">${total>0?'Ajusta los filtros para ver más resultados':'Haz clic en \"+ Nueva Entrega\" para registrar la primera'}</div>
    </div>`;
    return;
  }

  let html = '', lastDate = '';
  items.forEach(h => {
    if (h.fecha !== lastDate) {
      const d = new Date(h.fecha + 'T12:00:00');
      html += `<div class="date-sep">${d.toLocaleDateString('es-CL', { weekday:'long', day:'numeric', month:'long', year:'numeric' })}</div>`;
      lastDate = h.fecha;
    }
    const cls        = getShiftClass(h.turno);
    const turnoShort = h.turno?.split('(')[0]?.trim() || h.turno || '—';
    const turnoName  = h.turno?.match(/\(([^)]+)\)/)?.[1] || '';
    html += `<div class="ho-card ${DC_CARD_CLASS[dc]}" id="card-${h.id}">
      <div class="ho-header" onclick="toggleCard('${h.id}')">
        <span class="shift-badge ${cls}">${turnoShort}</span>
        <div class="ho-meta">
          <div class="ho-date">${h.fecha}${turnoName?' · '+turnoName:''}</div>
          <div class="ho-people"><strong>${h.entrega}</strong><span class="ho-arrow">→</span><strong>${h.recibe}</strong></div>
        </div>
        <div class="ho-actions">
          <button class="ho-btn-sm" onclick="event.stopPropagation();editHandover('${h.id}')" title="Editar">✏️</button>
          <button class="ho-btn-sm ho-btn-del" onclick="event.stopPropagation();quickDelete('${h.id}')" title="Eliminar">🗑</button>
          <span class="ho-toggle">▼</span>
        </div>
      </div>
      <div class="ho-body">
        ${h.trabajos   ? `<div class="ho-section"><div class="ho-section-title done">✅ Trabajos realizados</div><div class="ho-section-content done">${esc(h.trabajos)}</div></div>` : ''}
        ${h.ejecucion  ? `<div class="ho-section"><div class="ho-section-title running">🔧 Trabajos en ejecución</div><div class="ho-section-content running">${esc(h.ejecucion)}</div></div>` : ''}
        ${h.pendientes ? `<div class="ho-section"><div class="ho-section-title pending">⏳ Actividades pendientes</div><div class="ho-section-content pending">${esc(h.pendientes)}</div></div>` : ''}
        ${h.observaciones ? `<div class="ho-section"><div class="ho-section-title obs">📝 Observaciones</div><div class="ho-section-content obs">${esc(h.observaciones)}</div></div>` : ''}
        ${!h.trabajos && !h.ejecucion && !h.pendientes && !h.observaciones
          ? '<div style="color:var(--text3);font-size:12px;text-align:center;padding:12px">Sin detalles registrados</div>' : ''}
      </div>
    </div>`;
  });
  list.innerHTML = html;
}

// ── Card toggle ────────────────────────────────────
function toggleCard(id) {
  document.getElementById('card-' + id)?.classList.toggle('open');
}

// ── Modal ──────────────────────────────────────────
function openAdd(dc) {
  document.getElementById('edit-id').value   = '';
  document.getElementById('modal-dc').value  = dc;
  document.getElementById('modal-title').textContent = 'Nueva Entrega de Turno';
  document.getElementById('modal-sub').textContent   = `Registrar informe — ${DC_LABELS[dc]}`;
  document.getElementById('modal-badge').innerHTML   = `<span class="dc-badge ${DC_BADGE_CLASS[dc]}">${DC_LABELS[dc]}</span>`;

  const now = new Date();
  document.getElementById('ho-fecha').value = dateKey(now);
  const h = now.getHours();
  const sel = document.getElementById('ho-turno');
  if (h >= 22 || h < 8) sel.value = '22:15-8:00 (Noche)';
  else if (h >= 12)     sel.value = '12:30-22:15 (Tarde)';
  else                  sel.value = '8:00-17:45 (Mañana)';

  populateWorkers(dc);
  ['ho-trabajos','ho-ejecucion','ho-pendientes','ho-observaciones','ho-facility'].forEach(id => {
    document.getElementById(id).value = '';
  });
  document.getElementById('modal').classList.add('open');
}

function editHandover(id) {
  const h = handovers.find(x => x.id === id);
  if (!h) return;
  document.getElementById('edit-id').value   = id;
  document.getElementById('modal-dc').value  = h.dc;
  document.getElementById('modal-title').textContent = 'Editar Entrega de Turno';
  document.getElementById('modal-sub').textContent   = `Editando informe — ${DC_LABELS[h.dc]}`;
  document.getElementById('modal-badge').innerHTML   = `<span class="dc-badge ${DC_BADGE_CLASS[h.dc]}">${DC_LABELS[h.dc]}</span>`;

  document.getElementById('ho-fecha').value = h.fecha;
  document.getElementById('ho-turno').value = h.turno || '';
  populateWorkers(h.dc);
  document.getElementById('ho-entrega').value      = h.entrega;
  document.getElementById('ho-recibe').value       = h.recibe;
  document.getElementById('ho-trabajos').value     = h.trabajos    || '';
  document.getElementById('ho-ejecucion').value    = h.ejecucion   || '';
  document.getElementById('ho-pendientes').value   = h.pendientes  || '';
  document.getElementById('ho-observaciones').value = h.observaciones || '';
  document.getElementById('ho-facility').value      = h.facility      || '';
  document.getElementById('modal').classList.add('open');
}

function populateWorkers(dc) {
  const entSel = document.getElementById('ho-entrega');
  const recSel = document.getElementById('ho-recibe');
  let opts = `<optgroup label="${DC_LABELS[dc]}">`;
  (WORKERS[dc]||[]).forEach(w => { opts += `<option value="${w.name}">${w.name} (${w.role})</option>`; });
  opts += '</optgroup>';
  DC_LIST.filter(d => d !== dc).forEach(d => {
    opts += `<optgroup label="${DC_LABELS[d]}">`;
    (WORKERS[d]||[]).forEach(w => { opts += `<option value="${w.name}">${w.name} (${w.role})</option>`; });
    opts += '</optgroup>';
  });
  entSel.innerHTML = recSel.innerHTML = opts;
  if ((WORKERS[dc]||[]).length >= 2) recSel.selectedIndex = 1;
}

function saveHandover() {
  const dc           = document.getElementById('modal-dc').value;
  const fecha        = document.getElementById('ho-fecha').value;
  const turno        = document.getElementById('ho-turno').value;
  const entrega      = document.getElementById('ho-entrega').value;
  const recibe       = document.getElementById('ho-recibe').value;
  const trabajos     = document.getElementById('ho-trabajos').value.trim();
  const ejecucion    = document.getElementById('ho-ejecucion').value.trim();
  const pendientes   = document.getElementById('ho-pendientes').value.trim();
  const observaciones = document.getElementById('ho-observaciones').value.trim();
  const facility      = document.getElementById('ho-facility').value.trim();

  if (!fecha || !entrega || !recibe) { alert('Completa al menos: fecha, quién entrega y quién recibe.'); return; }
  if (entrega === recibe)            { alert('La persona que entrega y recibe no pueden ser la misma.'); return; }

  const editId = document.getElementById('edit-id').value;
  if (editId) {
    const idx = handovers.findIndex(h => h.id === editId);
    if (idx >= 0) {
      handovers[idx] = { ...handovers[idx], dc, fecha, turno, entrega, recibe, trabajos, ejecucion, pendientes, observaciones, facility };
    }
  } else {
    handovers.push({
      id: 'ho_' + Date.now() + '_' + Math.random().toString(36).substr(2,6),
      dc, fecha, hora:'', turno, entrega, recibe, trabajos, ejecucion, pendientes, observaciones, facility,
      created_at: new Date().toISOString()
    });
  }
  saveToFirebase();
  closeModal();
  render();
  showToast(`✅ Entrega ${editId?'actualizada':'registrada'} — ${DC_LABELS[dc]}`);
}

function quickDelete(id) {
  const h = handovers.find(x => x.id === id);
  if (!h) return;
  if (!confirm(`¿Estás seguro de eliminar la entrega de ${h.entrega} → ${h.recibe}?`)) return;
  handovers = handovers.filter(x => x.id !== id);
  saveToFirebase();
  render();
  showToast('🗑 Entrega eliminada');
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}
document.addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

// ── Print ──────────────────────────────────────────
function printReport(dc) {
  const dcH = handovers.filter(h => h.dc === dc).sort(sortDesc);
  if (dcH.length === 0) { alert('No hay entregas registradas para ' + DC_LABELS[dc]); return; }

  const rows = dcH.map((h,i) => `
    <div style="border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:14px;page-break-inside:avoid">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;border-bottom:2px solid #22d3ee;padding-bottom:8px">
        <div>
          <strong style="font-size:14px;color:#0e7490">${h.turno||'Turno'}</strong>
          <span style="color:#888;font-size:12px;margin-left:12px">${h.fecha}</span>
        </div>
        <span style="font-size:12px;color:#666">#${dcH.length-i}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">
        <div><span style="color:#888;font-size:11px">ENTREGA:</span> <strong>${h.entrega}</strong></div>
        <div><span style="color:#888;font-size:11px">RECIBE:</span> <strong>${h.recibe}</strong></div>
      </div>
      ${h.trabajos   ? `<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#059669;text-transform:uppercase;margin-bottom:4px">✅ Trabajos realizados</div><div style="background:#f0fdf4;border:1px solid #bbf7d0;border-left:3px solid #22c55e;padding:10px 14px;border-radius:6px;font-size:13px;white-space:pre-wrap;line-height:1.6">${h.trabajos}</div></div>` : ''}
      ${h.ejecucion  ? `<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#0284c7;text-transform:uppercase;margin-bottom:4px">🔧 Trabajos en ejecución</div><div style="background:#f0f9ff;border:1px solid #bae6fd;border-left:3px solid #38bdf8;padding:10px 14px;border-radius:6px;font-size:13px;white-space:pre-wrap;line-height:1.6">${h.ejecucion}</div></div>` : ''}
      ${h.pendientes ? `<div style="margin-bottom:10px"><div style="font-size:11px;font-weight:700;color:#d97706;text-transform:uppercase;margin-bottom:4px">⏳ Actividades pendientes</div><div style="background:#fffbeb;border:1px solid #fde68a;border-left:3px solid #f59e0b;padding:10px 14px;border-radius:6px;font-size:13px;white-space:pre-wrap;line-height:1.6">${h.pendientes}</div></div>` : ''}
      ${h.observaciones ? `<div><div style="font-size:11px;font-weight:700;color:#6b7280;text-transform:uppercase;margin-bottom:4px">📝 Observaciones</div><div style="background:#f9fafb;border:1px solid #e5e7eb;border-left:3px solid #9ca3af;padding:10px 14px;border-radius:6px;font-size:13px;white-space:pre-wrap;line-height:1.6">${h.observaciones}</div></div>` : ''}
    </div>`).join('');

  const win = window.open('', '_blank', 'width=900,height=700');
  win.document.write(`<!DOCTYPE html><html><head><title>Informe — ${DC_LABELS[dc]}</title>
    <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Segoe UI',system-ui,sans-serif;padding:30px;color:#1a1a1a}@media print{@page{size:A4;margin:15mm}}</style></head><body>
    <div style="text-align:center;margin-bottom:24px;border-bottom:3px solid #22d3ee;padding-bottom:16px">
      <h1 style="font-size:22px;color:#0e7490;margin-bottom:4px">⚡ Informe de Entrega de Turno</h1>
      <h2 style="font-size:16px;color:#374151;font-weight:600">${DC_LABELS[dc]}</h2>
      <p style="font-size:12px;color:#6b7280;margin-top:4px">Generado el ${new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'})} — ${dcH.length} entrega(s)</p>
    </div>
    ${rows}
    <div style="text-align:center;margin-top:20px;font-size:11px;color:#9ca3af;border-top:1px solid #e5e7eb;padding-top:10px">
      Entrega de Turno 2026 — ${DC_LABELS[dc]}
    </div>
    <`+`script>window.onload=()=>window.print()<`+`/script></body></html>`);
  win.document.close();
}

// ── DC Status & PDF ────────────────────────────────
function getLatestHandover(dc) {
  return handovers.filter(h => h.dc === dc).sort(sortDesc)[0] || null;
}

function getLatestHandoverToday(dc) {
  const today = dateKey(new Date());
  return handovers
    .filter(h => h.dc === dc && h.fecha === today)
    .sort(sortDesc)[0] || null;
}

function updateDCStatus() {
  let allComplete = true;
  const today = dateKey(new Date());
  DC_LIST.forEach(dc => {
    const hToday = getLatestHandoverToday(dc);
    const hAny   = getLatestHandover(dc);
    const card   = document.getElementById('status-' + dc);
    const icon   = document.getElementById('icon-' + dc);
    const detail = document.getElementById('status-detail-' + dc);
    if (hToday) {
      card?.classList.add('complete');
      if (icon) { icon.className = 'dc-status-icon done'; icon.textContent = '✅'; }
      if (detail) detail.textContent = `${hToday.entrega} → ${hToday.recibe} · ${hToday.fecha} · ${hToday.turno?.split('(')[0]?.trim()||''}`;
    } else {
      card?.classList.remove('complete');
      if (icon) { icon.className = 'dc-status-icon pending'; icon.textContent = '⏳'; }
      if (hAny) {
        if (detail) detail.textContent = `Última: ${hAny.fecha} — Falta entrega de hoy`;
      } else {
        if (detail) detail.textContent = 'Pendiente — sin entregas registradas';
      }
      allComplete = false;
    }
  });
  const dlBtn = document.getElementById('download-btn');
  const subEl = document.getElementById('send-panel-sub');
  if (allComplete) {
    dlBtn.disabled = false;
    subEl.textContent = '✅ Los 3 Data Centers completaron su entrega de hoy — listo para generar reporte';
    subEl.style.color = 'var(--green)';
  } else {
    dlBtn.disabled = true;
    const pending = DC_LIST.filter(dc => !getLatestHandoverToday(dc));
    subEl.textContent = `Faltan ${pending.length} DC hoy (${today}): ${pending.map(d=>DC_LABELS[d]).join(', ')}`;
    subEl.style.color = '';
  }
}

// ── PDF Generator (jsPDF — 3 columnas horizontales) ──
function resetApp() {
  // preserve counter
  const count = localStorage.getItem(COUNTER_KEY);
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  if (count) localStorage.setItem(COUNTER_KEY, count);
  handovers = [];
  if (firebaseConnected) {
    firebaseRef.set(null).catch(e => console.error('Firebase reset error:', e));
  }
  render();
  showToast('🔄 Sistema reiniciado para el siguiente turno');
}

function hexRGB(hex) {
  const h = hex.replace('#','');
  return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
}
function setFill(doc, hex) { const [r,g,b]=hexRGB(hex); doc.setFillColor(r,g,b); }
function setTxt(doc, hex)  { const [r,g,b]=hexRGB(hex); doc.setTextColor(r,g,b); }
function setDrw(doc, hex)  { const [r,g,b]=hexRGB(hex); doc.setDrawColor(r,g,b); }

function wrapLines(doc, text, font, size, maxW) {
  doc.setFont('helvetica', font); doc.setFontSize(size);
  const result = [];
  for (const raw of (text||'').split('\n')) {
    const t = raw.trim(); if (!t) continue;
    const words = ('• '+t).split(' ');
    let line = '';
    for (const w of words) {
      const test = line ? line+' '+w : w;
      if (doc.getTextWidth(test) <= maxW) { line = test; }
      else { if (line) result.push(line); line = '  '+w; }
    }
    if (line) result.push(line);
  }
  return result;
}

function secHeight(doc, text, colW) {
  if (!text||!text.trim()) return 0;
  const lines = wrapLines(doc, text, 'normal', 12, colW - 20);
  return 16 + 3 + lines.length * 15 + 5;
}

function drawServerIcon(doc, x, y, dotColor) {
  // 3 stacked rack units
  const sw=14, sh=4, gap=2;
  doc.setLineWidth(0.3);
  for (let i=0; i<3; i++) {
    const ry = y + (i*(sh+gap));
    setFill(doc,'#FFFFFF'); setDrw(doc,'#FFFFFF');
    doc.roundedRect(x, ry, sw, sh, 0.8, 0.8, 'F');
    // LED dot
    setFill(doc, dotColor);
    doc.circle(x+sw-3, ry+sh/2, 1, 'F');
  }
}

function drawSectionIcon(doc, type, x, cy, color) {
  setFill(doc, color); setDrw(doc, color);
  doc.setLineWidth(1);

  if (type === 'check') {
    doc.circle(x+4, cy, 5, 'S');
    doc.setLineWidth(1.5);
    doc.lines([[2,-2.2],[3.5,4.7]], x+1.5, cy, [1,1], 'S');

  } else if (type === 'nut') {
    doc.setLineWidth(1);
    const R=5.5, r=2.2, cx=x+4;
    const pts = [];
    for (let i=0;i<6;i++) {
      const a = (Math.PI/180)*(90+i*60);
      pts.push([cx + R*Math.cos(a), cy + R*Math.sin(a)]);
    }
    doc.lines(
      pts.slice(1).map((p,i)=>[p[0]-pts[i][0], p[1]-pts[i][1]]).concat([[pts[0][0]-pts[5][0], pts[0][1]-pts[5][1]]]),
      pts[0][0], pts[0][1], [1,1], 'S'
    );
    doc.circle(cx, cy, r, 'S');

  } else if (type === 'clock') {
    doc.circle(x+4, cy, 5, 'S');
    doc.setLineWidth(1.2);
    doc.lines([[0,3.5]], x+4, cy, [1,1], 'S');
    doc.lines([[3,1.5]], x+4, cy, [1,1], 'S');

  } else if (type === 'beacon') {
    doc.lines([[4.5,-10],[4.5,0]], x-0.5, cy+5.5, [1,1], 'S');
    setFill(doc, color);
    doc.rect(x+3.2, cy-1, 1.6, 3.5, 'F');
    doc.circle(x+4, cy-3.8, 0.9, 'F');

  } else if (type === 'building') {
    doc.setLineWidth(0.8);
    doc.rect(x+1, cy-5.5, 7, 8.5, 'S');
    doc.lines([[-1.5,-4],[5,0],[5,4]], x-0.5, cy+3, [1,1], 'S');
    doc.rect(x+3.2, cy-5.5, 2, 3, 'S');
    setFill(doc, color);
    doc.rect(x+1.5, cy+0.5, 1.8, 1.8, 'F');
    doc.rect(x+5.5, cy+0.5, 1.8, 1.8, 'F');
  }
}

function drawSection(doc, x, y, colW, title, text, bgHex, accentHex, titleHex, iconType, scale = 1) {
  if (!text||!text.trim()) return y;
  
  const fSize = 12 * scale;
  const lHeight = 14 * scale;

  // Mantenemos el título robusto y fijamos su posición
  const titleScale = Math.max(scale, 0.85);
  doc.setFont('helvetica','bold'); 
  doc.setFontSize(10.5 * titleScale);
  const titleY = y + 14; 

  // El texto comienza siempre respetando al título
  const firstTextY = titleY + 4 + (lHeight * 0.8);
  const padBot = 8;

  const lines = wrapLines(doc, text, 'normal', fSize, colW - 20);
  const h = 18 + (lines.length * lHeight) + padBot;

  setFill(doc, bgHex); setDrw(doc,'#DDDDDD');
  doc.setLineWidth(0.1);
  doc.rect(x, y, colW, h, 'F');

  setFill(doc, accentHex);
  doc.rect(x, y, 3, h, 'F');

  drawSectionIcon(doc, iconType, x+9, y+11, titleHex);

  setTxt(doc, titleHex);
  doc.text(title, x+24, titleY);

  setTxt(doc,'#1a1a1a');
  doc.setFont('helvetica','normal'); doc.setFontSize(fSize);
  let iy = firstTextY;
  for (const line of lines) { doc.text(line, x+10, iy); iy += lHeight; }

  return y + h + 6;
}

function downloadConsolidatedReport() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit:'pt', format:'a4', orientation:'landscape' });

  const PW = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();
  const MARGIN = 20, GAP = 11, HDR = 52, FOOT = 20;
  const COL_W = (PW - 2*MARGIN - 2*GAP) / 3;

  const DC_CFG = {
    SanMartin: { color:'#00BCD4', dark:'#006064' },
    Apoquindo: { color:'#9C27B0', dark:'#4A148C' },
    Paine:     { color:'#2E7D32', dark:'#1B5E20' },
  };
  const SECS = [
    ['TRABAJOS REALIZADOS',    'trabajos',      '#E8F5E9','#2E7D32','#1B5E20','check'   ],
    ['TRABAJOS EN EJECUCION',  'ejecucion',     '#E3F2FD','#1565C0','#0D47A1','nut'     ],
    ['ACTIVIDADES PENDIENTES', 'pendientes',    '#FFF8E1','#E65100','#BF360C','clock'   ],
    ['OBSERVACIONES',          'observaciones', '#FCE4EC','#C62828','#B71C1C','beacon'  ],
    ['FACILITY / EDIFICIO',    'facility',      '#EDE7F6','#7B1FA2','#4A148C','building'],
  ];

  const fecha = new Date().toLocaleDateString('es-CL',{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  // ── Page bg ──
  setFill(doc,'#ECEFF4'); doc.rect(0,0,PW,PH,'F');

  // ── Header ──
  setFill(doc,'#1A2B4A'); doc.rect(0, 0, PW, HDR, 'F');
  setTxt(doc,'#00BCD4'); doc.setFont('helvetica','bold'); doc.setFontSize(20);
  doc.text('Informe Consolidado de Entrega de Turno', PW/2, 28, {align:'center'});
  setTxt(doc,'#90A4AE'); doc.setFont('helvetica','normal'); doc.setFontSize(13);
  doc.text(fecha + '  ·  3 Data Centers', PW/2, 44, {align:'center'});

  // ── 3 columns ──
  DC_LIST.forEach((dc, i) => {
    const h = getLatestHandover(dc);
    if (!h) return;
    const cfg = DC_CFG[dc];
    const cx = MARGIN + i*(COL_W+GAP);
    const cardTop = HDR + 15;
    const cardBot = PH - FOOT - 10;
    const cardH   = cardBot - cardTop;

    // shadow
    setFill(doc,'#C8CDD4');
    doc.roundedRect(cx+2, cardTop+2, COL_W, cardH, 6, 6, 'F');
    // white card
    setFill(doc,'#FFFFFF'); setDrw(doc,'#CCCCCC'); doc.setLineWidth(0.4);
    doc.roundedRect(cx, cardTop, COL_W, cardH, 6, 6, 'FD');

    // DC header band
    const BAND = 24;
    setFill(doc, cfg.color);
    doc.roundedRect(cx, cardTop, COL_W, BAND, 6, 6, 'F');
    doc.rect(cx, cardTop + BAND/2, COL_W, BAND/2, 'F');

    // server icon
    drawServerIcon(doc, cx+8, cardTop+4, cfg.color);

    // DC name
    setTxt(doc,'#FFFFFF'); doc.setFont('helvetica','bold'); doc.setFontSize(14);
    doc.text(DC_LABELS[dc], cx+28, cardTop+17);

    let y = cardTop + BAND + 15;
    const PAD = cx + 12;

    // info rows
    const infoRows = [
      ['Fecha:',   h.fecha,             '#555555','#333333', false],
      ['Turno:',   h.turno||'—',        '#555555','#333333', false],
      ['Entrega:', h.entrega,           '#555555', cfg.color, true],
      ['Recibe:',  h.recibe,            '#555555', cfg.color, true],
    ];
    for (const [lbl, val, lc, vc, bold] of infoRows) {
      doc.setFont('helvetica','bold'); doc.setFontSize(11.5);
      setTxt(doc, lc); doc.text(lbl, PAD, y);
      doc.setFont('helvetica', bold?'bold':'normal'); doc.setFontSize(11.5);
      setTxt(doc, vc);
      let v = val;
      while (v.length>2 && doc.getTextWidth(v) > COL_W-80) v = v.slice(0,-2)+'…';
      doc.text(v, PAD+52, y);
      y += 18;
    }

    // divider
    y += 5;
    setDrw(doc,'#EEEEEE'); doc.setLineWidth(0.3);
    doc.line(cx+4, y, cx+COL_W-4, y);
    y += 10;

    // auto-adjust scale calculations
    let scale = 1.0;
    let sectionCount = SECS.filter(([t,k]) => h[k]?.trim()).length;
    if (sectionCount > 0) {
      while (scale > 0.4) {
        let reqH = 0;
        for (const [title, key] of SECS) {
          const text = h[key]||'';
          if (!text||!text.trim()) continue;
          const lines = wrapLines(doc, text, 'normal', 12 * scale, (COL_W - 12) - 20);
          reqH += 26 + (lines.length * (14 * scale)) + 6;
        }
        if (reqH <= (cardBot - y - 10)) break;
        scale -= 0.05;
      }
    }

    // sections
    for (const [title, key, bg, acc, tc, icon] of SECS) {
      y = drawSection(doc, cx+6, y, COL_W-12, title, h[key]||'', bg, acc, tc, icon, scale);
    }
  });

  // ── Footer ──
  setTxt(doc,'#999999'); doc.setFont('helvetica','normal'); doc.setFontSize(8);
  doc.text('Entrega de Turno 2026 — Sistema de Gestion de Data Centers  ·  San Martin · Apoquindo · Paine', PW/2, PH - 8, {align:'center'});

  doc.save(`Entrega_Turno_${dateKey(new Date())}.pdf`);
  showToast('📥 PDF descargado correctamente');
  setTimeout(() => resetApp(), 1500);
}

// ── Toast ──────────────────────────────────────────
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Helpers ────────────────────────────────────────
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function dateKey(d) {
  return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
}
function pad(n) { return String(n).padStart(2,'0'); }
function sortDesc(a,b) {
  return (`${b.fecha} ${b.hora||'00:00'}`).localeCompare(`${a.fecha} ${a.hora||'00:00'}`);
}
function getShiftClass(turno) {
  if (!turno) return 'dia';
  if (turno.includes('Mañana') || turno.includes('8:00-17'))  return 'manana';
  if (turno.includes('Tarde')  || turno.includes('12:30'))    return 'tarde';
  if (turno.includes('Noche')  && !turno.includes('PT'))      return 'noche';
  if (turno.includes('PT Día') || turno.includes('08:00-20')) return 'ptday';
  if (turno.includes('PT Noche')|| turno.includes('20:00-08'))return 'ptnight';
  return 'dia';
}
function getWeekRange() {
  const now = new Date();
  const day = now.getDay() || 7;
  const mon = new Date(now); mon.setDate(now.getDate()-day+1);
  const sun = new Date(mon); sun.setDate(mon.getDate()+6);
  return { from: dateKey(mon), to: dateKey(sun) };
}
